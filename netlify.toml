[build]
  command = "npm run build"
  publish = "build"

# Redirecciones para páginas estáticas (deben ir antes que la catch-all)
[[redirects]]
  from = "/eliminar-cuenta"
  to = "/eliminar-cuenta.html"
  status = 200

[[redirects]]
  from = "/privacidad"
  to = "/privacidad.html"
  status = 200

# Redirección catch-all para la SPA (debe ir al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
