<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Mochi, app de bienestar para parejas" />
    <title>Mochi</title>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para correr esta app.</noscript>
    <div id="root"></div>
    <script>
      // Force migration away from older cached shells/service workers.
      (function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          }).catch(function () {});
        }
        if ("caches" in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              if (k.indexOf("mochi") !== -1 || k.indexOf("workbox") !== -1) {
                caches.delete(k);
              }
            });
          }).catch(function () {});
        }
      })();
    </script>
  </body>
</html>
